<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NotebookLM Capture Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 20px; }
    h1 { margin-top: 0; }
    label { display: block; margin: 14px 0 6px; font-weight: 600; }
    textarea, input, select { width: 100%; box-sizing: border-box; padding: 8px; }
    .row { margin-top: 12px; }
    .actions { margin-top: 16px; display: flex; gap: 8px; }
    #status { margin-top: 12px; min-height: 20px; color: #0b57d0; }
  </style>
</head>
<body>
  <h1>NotebookLM Capture Settings</h1>

  <label for="notebooks">Notebooks (one per line: Name|URL)</label>
  <textarea id="notebooks" rows="5" placeholder="Idea|https://notebooklm.google.com/notebook/xxx"></textarea>

  <label for="position">Floating UI position</label>
  <select id="position">
    <option value="bottom-right">Bottom Right</option>
    <option value="bottom-left">Bottom Left</option>
    <option value="top-right">Top Right</option>
    <option value="top-left">Top Left</option>
  </select>

  <div class="row">
    <label>
      <input id="startCollapsed" type="checkbox" style="width: auto;"> Start panel collapsed
    </label>
  </div>

  <label for="tags">Tag presets (comma-separated)</label>
  <input id="tags" type="text" placeholder="todo,research,idea">

  <div class="actions">
    <button id="save" type="button">Save</button>
    <button id="reset" type="button">Reset</button>
    <button id="downloadLogs" type="button">Download Logs</button>
  </div>

  <div id="status"></div>

  <script src="../storage/settings_store.js"></script>
  <script src="../storage/log_store.js"></script>
  <script src="options.js"></script>
</body>
</html>
